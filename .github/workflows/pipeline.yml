name: Weekly Data Engineering Pipeline

# This determines WHEN the script runs
on:
  schedule:
    # Runs at 02:00 AM every Monday (Cron syntax)
    - cron: '0 2 * * 1'
  workflow_dispatch: # This allows you to click a "Run" button manually on GitHub!

jobs:
  scrape_and_load:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Web Scraper (Extract)
        run: python scraper.py

      - name: Run Cloud Loader (Load)
        # We pass the secret from GitHub directly into the script's environment
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
        run: python load_to_motherduck.py